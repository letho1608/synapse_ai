syntax = "proto3";

package node_service;

service NodeService {
  rpc SendPrompt (PromptRequest) returns (Tensor) {}
  rpc SendTensor (TensorRequest) returns (Tensor) {}
  rpc SendExample (ExampleRequest) returns (Loss) {}
  rpc CollectTopology (CollectTopologyRequest) returns (Topology) {}
  rpc SendResult (SendResultRequest) returns (Empty) {}
  rpc SendOpaqueStatus (SendOpaqueStatusRequest) returns (Empty) {}
  rpc HealthCheck (HealthCheckRequest) returns (HealthCheckResponse) {}
  rpc SyncWeights (SyncWeightsRequest) returns (SyncWeightsResponse) {}
  rpc TestNetwork (TestNetworkRequest) returns (TestNetworkResponse) {}
  rpc ProfileHardware (ProfileHardwareRequest) returns (ProfileHardwareResponse) {}
  rpc SetupRing (SetupRingRequest) returns (Empty) {}
  rpc TransferChunk (TransferChunkRequest) returns (Empty) {}
  rpc TriggerRingAllReduce (TriggerRingAllReduceRequest) returns (Empty) {}
}

message Shard {
  string model_id = 1;
  int32 start_layer = 2;
  int32 end_layer = 3;
  int32 n_layers = 4;
}

message PromptRequest {
  Shard shard = 1;
  string prompt = 2;
  optional string request_id = 3;
  optional InferenceState inference_state = 4;
}

message TensorRequest {
  Shard shard = 1;
  Tensor tensor = 2;
  optional string request_id = 3;
  optional InferenceState inference_state = 4;
}

message ExampleRequest {
  Shard shard = 1;
  Tensor example = 2;
  Tensor target = 3;
  Tensor length = 4;
  bool train = 5;
  optional string request_id = 6;
}

message Loss {
  float loss = 1;
  optional Tensor grads = 2;
}

message Tensor {
  bytes tensor_data = 1;
  repeated int32 shape = 2;
  string dtype = 3;
}

message TensorList {
  repeated Tensor tensors = 1;
}

message InferenceState {
  map<string, Tensor> tensor_data = 1;
  map<string, TensorList> tensor_list_data = 2;
  string other_data_json = 3;
}

message CollectTopologyRequest {
  repeated string visited = 1;
  int32 max_depth = 2;
}

message Topology {
  map<string, DeviceCapabilities> nodes = 1;
  map<string, PeerConnections> peer_graph = 2;
}

message PeerConnection {
  string to_id = 1;
  optional string description = 2;
}

message PeerConnections {
  repeated PeerConnection connections = 1;
}

message DeviceFlops {
  double fp32 = 1;
  double fp16 = 2;
  double int8 = 3;
}

message DeviceCapabilities {
  string model = 1;
  string chip = 2;
  int32 memory = 3;
  DeviceFlops flops = 4;
  string gpu_backend = 5;
  int32 cpu_cores = 6;
  int32 system_ram_mb = 7;
  int32 gpu_count = 8;
  int32 disk_gb = 9;
  double warmup_throughput = 10;
  double cpu_usage_pct = 11;
  double gpu_usage_pct = 12;
  int32 ram_used_mb = 13;
  int32 gpu_memory_used_mb = 14;
}


message SendResultRequest {
  string request_id = 1;
  repeated int32 result = 2;
  optional Tensor tensor = 3;
  bool is_finished = 4;
}

message SendOpaqueStatusRequest {
  string request_id = 1;
  string status = 2;
}

message HealthCheckRequest {}

message HealthCheckResponse {
  bool is_healthy = 1;
}

message SyncWeightsRequest {
  string model_id = 1;
  Tensor weights = 2;
  int32 step = 3;
}

message SyncWeightsResponse {
  Tensor averaged_weights = 1;
}

message TestNetworkRequest {
  bytes payload = 1;
}

message TestNetworkResponse {
  bytes payload = 1;
  double duration_ms = 2;
}

message ProfileHardwareRequest {
  Shard shard = 1;
  Tensor example = 2;
  Tensor target = 3;
  Tensor length = 4;
  int32 n_iters = 5;
  int32 skip_iters = 6;
}

message ProfileHardwareResponse {
  double samples_per_sec = 1;
  double avg_latency_ms = 2;
}

message Empty {}

message SetupRingRequest {
  int32 rank = 1;
  int32 world_size = 2;
  string successor_url = 3;
}

enum RingStepType {
  REDUCE = 0;
  REPLACE = 1;
}

message TransferChunkRequest {
  int32 chunk_index = 1;
  Tensor tensor = 2;
  RingStepType step_type = 3;
}

message TriggerRingAllReduceRequest {
  string model_id = 1;
}
